kotlin.code.style=official
org.gradle.jvmargs=-Xmx2g
# The Weave gradle plugin (1.3.3) configures Minecraft deps in afterEvaluate and is
# NOT compatible with Gradle's configuration cache — a stale cache silently drops the
# mapped-Minecraft compileOnly dependency (symptom: "package net.minecraft.client does not exist").
org.gradle.configuration-cache=false
